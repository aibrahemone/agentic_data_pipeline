services:

  # ── Source Postgres (demo data source) ───────
  source-postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: source_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - source_pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d source_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  source_pg_data:
