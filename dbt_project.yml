name: "ai_pipeline"
version: "1.0.0"
config-version: 2

profile: "ai_pipeline"

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  ai_pipeline:
    staging:
      +materialized: view
      +schema: staging # dbt writes staging models to my_db.staging
    marts:
      +materialized: table
      +schema: marts # dbt writes mart models to my_db.marts
